default_environment: dev
project_id: 019e6219-e3f3-703b-a606-c26b307b3042
environments:
- name: dev
- name: staging
- name: prod
python: python3.11
plugins:
  extractors:
  - name: tap-github
    variant: meltanolabs
    pip_url: meltanolabs-tap-github
    config:
      repositories:
      - pandas-dev/pandas
    select:
    - releases.tag_name
    - releases.body
    - releases.published_at
  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
  - name: target-bigquery
    variant: z3z1ma
    pip_url: git+https://github.com/z3z1ma/target-bigquery.git setuptools<80
    config:
      credentials_path: /home/dancer/dotted-weft-496714-k5-ae1408b36d6d.json
      dataset: ingestion
      denormalized: true
      flattening_enabled: true
      flattening_max_depth: 1
      method: batch_job
      project: dotted-weft-496714-k5
